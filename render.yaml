services:
  - type: cron
    name: epf-scraper
    runtime: node
    plan: free
    schedule: "45 4 * * 1-5"  # Weekdays 12:45 PM MYT (04:45 UTC)
    buildCommand: npm ci
    startCommand: bash ci_scrape.sh
    repo: https://github.com/JK0611/Employees-Provident-Fund-Portfolio
    branch: main
    envVars:
      - key: NODE_VERSION
        value: 20
