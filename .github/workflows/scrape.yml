name: Daily Bursa EPF Scrape

on:
  schedule:
    # Weekdays at 12:45 PM Malaysian Time (04:45 UTC)
    - cron: '45 4 * * 1-5'
    # Weekdays at 5:15 PM Malaysian Time (09:15 UTC)
    - cron: '15 9 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2 libxshmfence1

      - name: Download Chrome for Puppeteer
        run: npx @puppeteer/browsers install chrome@136.0.7103.49 --path /home/runner/.cache/puppeteer

      - name: Run Scraper
        run: node scrape_test.js
        env:
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer

      - name: Process Data
        run: node process_data.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add links.json scrape_test_results.json codes_cache.json frontend/data.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update EPF announcement data [skip ci]" && git push)
