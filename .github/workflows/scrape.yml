name: Daily Bursa EPF Scrape

on:
  schedule:
    # Weekdays at 12:45 PM Malaysian Time (04:45 UTC)
    - cron: '45 4 * * 1-5'
    # Weekdays at 5:15 PM Malaysian Time (09:15 UTC)
    - cron: '15 9 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Scraper
        id: scraper
        continue-on-error: true
        run: node scrape_test.js

      - name: Process Data
        if: steps.scraper.outcome == 'success'
        run: node process_data.js

      - name: Commit and Push Changes
        if: steps.scraper.outcome == 'success'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add links.json scrape_test_results.json codes_cache.json frontend/data.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update EPF announcement data [skip ci]" && git push)

      - name: Report scraper status
        if: always()
        run: |
          if [ "${{ steps.scraper.outcome }}" == "failure" ]; then
            echo "::warning::Scraper failed but workflow kept alive to preserve schedule"
          else
            echo "Scraper completed successfully"
          fi

