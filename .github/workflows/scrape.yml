name: Daily Bursa EPF Scrape

on:
  schedule:
    # Runs daily at 23:00 UTC (7:00 AM Malaysian Time)
    - cron: '0 23 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium with system dependencies
        run: npx playwright install --with-deps chromium

      - name: Run Scraper
        run: node scrape_test.js

      - name: Process Data
        run: node process_data.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add links.json scrape_test_results.json codes_cache.json frontend/data.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update EPF announcement data [skip ci]" && git push)
